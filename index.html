<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB 可轉債分析平台</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- 頂部導覽 -->
  <header class="header">
    <div class="header-title">
      <div class="logo">CB</div>
      <span>可轉債分析平台</span>
    </div>
    <div class="header-actions">
      <span class="header-date" id="header-date"></span>
      <span class="header-status" id="header-status"></span>
      <button class="btn-icon mobile-filter-toggle" onclick="App.toggleMobileFilter()" title="篩選">&#x2630;</button>
      <button class="btn-icon" onclick="App.refreshData()" title="重新載入資料">&#x21BB;</button>
    </div>
  </header>

  <!-- 主版面 -->
  <div class="main-layout">
    <!-- 左側篩選面板 -->
    <aside class="sidebar" id="filter-panel">
      <!-- 由 JS 動態產生 -->
    </aside>

    <!-- 主內容區 -->
    <main class="content">
      <div id="main-table">
        <!-- 由 JS 動態產生 -->
      </div>
    </main>
  </div>

  <!-- 右側詳情面板 -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div class="detail-title" id="detail-title"></div>
      <button class="detail-close" onclick="App.closeDetail()">&times;</button>
    </div>

    <!-- 1. 股價資訊 + 2. 個股K線 -->
    <div class="detail-section">
      <h3>股價資訊</h3>
      <div id="detail-price-info"></div>
      <div class="chart-container">
        <canvas id="detail-price-chart"></canvas>
      </div>
    </div>

    <!-- 3. 個股三大法人 -->
    <div class="detail-section">
      <h3>個股三大法人買賣超</h3>
      <div id="detail-inst-info"></div>
    </div>

    <!-- 4. CB 資訊 + 5. CB K線 -->
    <div class="detail-section">
      <h3>CB 可轉債資訊</h3>
      <div id="detail-cb-info"></div>
      <div class="chart-container">
        <canvas id="detail-cb-price-chart"></canvas>
      </div>
    </div>

    <!-- 6. CB 三大法人 -->
    <div class="detail-section">
      <h3>CB 三大法人買賣超</h3>
      <div id="detail-cb-inst-info"></div>
    </div>

    <!-- 7. 新聞資訊 -->
    <div class="detail-section">
      <h3>新聞資訊</h3>
      <div id="detail-news-info"></div>
    </div>
  </div>

  <!-- CB 開標統計表 Modal -->
  <div class="auction-modal" id="auction-modal" onclick="App.closeAuctionModal(event)">
    <div class="auction-modal-content" onclick="event.stopPropagation()">
      <div class="auction-modal-header">
        <div class="auction-modal-title" id="auction-modal-title"></div>
        <button class="detail-close" onclick="App.closeAuctionModal()">&times;</button>
      </div>
      <div class="auction-modal-body" id="auction-modal-body"></div>
    </div>
  </div>

  <!-- 手機篩選遮罩 -->
  <div class="mobile-filter-backdrop" id="mobile-filter-backdrop" onclick="App.toggleMobileFilter()"></div>

  <!-- 載入畫面 -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">正在載入資料...</div>
  </div>

  <!-- 載入 JS 模組 (順序重要) -->
  <script src="js/config.js"></script>
  <script src="js/watchlist.js"></script>
  <script src="js/sheetsApi.js"></script>
  <script src="js/dataProcessor.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/table.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/exportCsv.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
