name: Margin Late (融資融券 19:30)

# 融資融券資料 TWSE/TPEX 通常傍晚才公布,
# 18:23 主 cron 抓會拿到舊資料或失敗,所以分離出來在 19:30 單獨跑。
#
# 19:30 TPE = 11:30 UTC,週一~五。
#
# 流程:
#   1. fetch_stocks (SOURCES=MARGIN_TWSE,MARGIN_TPEX) → Drive
#   2. parse_and_export --only-sources MARGIN_TWSE,MARGIN_TPEX --skip-sheet
#      → Supabase stock_margin + all-data.json marginTrading 欄
#   3. commit + push JSON
#
# TG 標題客製為「融資融券」以區分主 pipeline 通知。

on:
  schedule:
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '特定日期 YYYYMMDD (空白則抓今天 Asia/Taipei)'
        required: false
        default: ''

permissions:
  contents: write   # 需要 commit data/all-data.json

jobs:
  margin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-stocks.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-stocks.txt

      - name: Fetch margin CSVs (TWSE + TPEX)
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS:      ${{ secrets.DRIVE_FOLDERS }}
          FETCH_DATE:         ${{ inputs.date }}
          SOURCES:            MARGIN_TWSE,MARGIN_TPEX
        run: python scripts/fetch_stocks.py

      - name: Parse + Export (margin only)
        env:
          GOOGLE_CREDENTIALS:        ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS:             ${{ secrets.DRIVE_FOLDERS }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TG_BOT_TOKEN:              ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:                ${{ secrets.TG_CHAT_ID }}
        run: |
          python scripts/parse_and_export.py \
            --only-sources MARGIN_TWSE,MARGIN_TPEX \
            --skip-sheet \
            --label "融資融券" \
            ${{ inputs.date }}

      - name: Commit & push data/all-data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/all-data.json
          if git diff --cached --quiet; then
            echo "no JSON changes"
            exit 0
          fi
          git commit -m "Update data/all-data.json @ $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M') (margin)"
          for i in 1 2 3; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed,rebase 後重試..."
            git pull --rebase --autostash
          done
          echo "push failed after 3 retries"
          exit 1
