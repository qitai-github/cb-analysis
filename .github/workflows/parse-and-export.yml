name: Parse + Export (CSV → DB + JSON)

# 自己 cron 觸發,不依賴 fetch-stocks workflow。
# 排在 GAS publishAllData (14:40 TPE) 之後 + 給 TWSE T86 充分發布時間 (~16:00),
# 18:30 TPE = 10:30 UTC,週一~五。
on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '特定日期 YYYYMMDD (空白則抓今天 Asia/Taipei)'
        required: false
        default: ''

permissions:
  contents: write   # 需要 commit data/all-data.json

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-stocks.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-stocks.txt

      - name: Run parse_and_export
        env:
          GOOGLE_CREDENTIALS:        ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS:             ${{ secrets.DRIVE_FOLDERS }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TG_BOT_TOKEN:              ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:                ${{ secrets.TG_CHAT_ID }}
        run: python scripts/parse_and_export.py ${{ inputs.date }}

      - name: Commit & push data/all-data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/all-data.json
          if git diff --cached --quiet; then
            echo "no JSON changes"
            exit 0
          fi
          git commit -m "Update data/all-data.json @ $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          # 重試 3 次,中間 rebase 解小衝突
          for i in 1 2 3; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed,rebase 後重試..."
            git pull --rebase --autostash
          done
          echo "push failed after 3 retries"
          exit 1
