name: Parse + Export (CSV → DB + JSON)

# 自己 cron 觸發,不依賴 fetch-stocks workflow。
# 排在 fetch-stocks (18:23) 之後 24 分鐘,GAS publishAllData (14:40 TPE) 之後,
# TWSE T86 充分發布時間 (~16:00) 之後。
# 18:47 TPE = 10:47 UTC,週一~五。用奇怪分鐘避開 GHA :00/:30 排程高峰。
#
# 注意: 融資融券 (MARGIN_TWSE/TPEX) 用 --only-sources 排除,
#       改由 margin-late.yml 在 19:30 TPE (融資融券公布之後) 單獨補抓。
on:
  schedule:
    - cron: '47 10 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '特定日期 YYYYMMDD (空白則抓今天 Asia/Taipei)'
        required: false
        default: ''
      only_sources:
        description: '只跑指定 source (逗號分隔);空白 = 6 個(排除融資融券)'
        required: false
        default: ''

permissions:
  contents: write   # 需要 commit data/all-data.json

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements-stocks.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-stocks.txt

      - name: Run parse_and_export
        env:
          GOOGLE_CREDENTIALS:        ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS:             ${{ secrets.DRIVE_FOLDERS }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TG_BOT_TOKEN:              ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:                ${{ secrets.TG_CHAT_ID }}
          # 手動 dispatch 沒填 → 6 個 source (排除融資融券)
          ONLY: ${{ inputs.only_sources || 'STOCK_INST_TWSE,STOCK_INST_TPEX,STOCK_PRICE_TWSE,STOCK_PRICE_TPEX,CB_PRICE,CB_INST' }}
        run: python scripts/parse_and_export.py --only-sources "$ONLY" ${{ inputs.date }}

      - name: Commit & push data/all-data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/all-data.json
          if git diff --cached --quiet; then
            echo "no JSON changes"
            exit 0
          fi
          git commit -m "Update data/all-data.json @ $(TZ=Asia/Taipei date +'%Y-%m-%d %H:%M')"
          # 重試 3 次,中間 rebase 解小衝突
          for i in 1 2 3; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed,rebase 後重試..."
            git pull --rebase --autostash
          done
          echo "push failed after 3 retries"
          exit 1
