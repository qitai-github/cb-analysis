name: Fetch Stocks Backup

# GAS 主路徑之外的備援。每日 18:30 TPE 自動觸發,把 6 個 CSV 抓網頁覆蓋到 Drive。
# 前提: GAS CreatePlaceholders.gs 已每日 00:30 預建 6 個空檔
#       (SA 只能覆蓋既存檔,不能建新檔 - storage quota 限制)。
# 18:30 TPE = 10:30 UTC,週一~五。
# 接著 19:00 TPE parse-and-export.yml 自己 cron 觸發,讀 Drive 的 fresh 資料。

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '特定日期 YYYYMMDD (空白則抓今天 Asia/Taipei)'
        required: false
        default: ''
      sources:
        description: '只跑指定來源 (逗號分隔,例 STOCK_INST_TWSE,CB_INST);空白 = 全跑 6 個'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-stocks.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-stocks.txt

      - name: Run fetcher
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS: ${{ secrets.DRIVE_FOLDERS }}
          FETCH_DATE: ${{ inputs.date }}
          SOURCES: ${{ inputs.sources }}
        run: python scripts/fetch_stocks.py
