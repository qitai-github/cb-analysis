name: Fetch Stocks Backup

# GAS 主路徑之外的備援。每日 18:23 TPE 自動觸發,把 6 個 CSV 抓網頁覆蓋到 Drive。
# 前提: GAS CreatePlaceholders.gs 已每日 00:30 預建 8 個空檔
#       (SA 只能覆蓋既存檔,不能建新檔 - storage quota 限制)。
# 18:23 TPE = 10:23 UTC,週一~五。用奇怪分鐘避開 GHA :00/:30 排程高峰
# (官方文件說明 schedule 不保證準時,實測 :00 / :30 延遲可達 1-2 小時)。
# 接著 18:47 TPE parse-and-export.yml 自己 cron 觸發 (相隔 24 分鐘)。
#
# 注意: 融資融券 (MARGIN_TWSE/TPEX) 排除在此 cron 之外!
#       TWSE/TPEX 融資融券通常 21:00 後才公布,18:23 抓會拿到舊資料或失敗,
#       改由 margin-late.yml 在 19:30 TPE 單獨抓。

on:
  schedule:
    - cron: '23 10 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: '特定日期 YYYYMMDD (空白則抓今天 Asia/Taipei)'
        required: false
        default: ''
      sources:
        description: '只跑指定來源 (逗號分隔);空白 = 跑 6 個(排除融資融券)'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-stocks.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-stocks.txt

      - name: Run fetcher
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS: ${{ secrets.DRIVE_FOLDERS }}
          FETCH_DATE: ${{ inputs.date }}
          # 手動 dispatch 沒填 sources → 跑 6 個 (排除融資融券,改由 margin-late.yml 跑)
          SOURCES: ${{ inputs.sources || 'STOCK_INST_TWSE,STOCK_INST_TPEX,STOCK_PRICE_TWSE,STOCK_PRICE_TPEX,CB_PRICE,CB_INST' }}
        run: python scripts/fetch_stocks.py
