name: Fetch Stocks Backup

# GAS 主路徑之外的備援,只允許手動觸發。
# ⚠️ 已停用自動排程:Service Account 沒有自己的 Drive storage quota,
#   只能「覆蓋 GAS 已建立的舊檔」,無法「建立新檔」。
#   故當 TWSE T86 (16:00 後才公布) 還沒被 GAS 抓到時,此 workflow 會 storageQuotaExceeded。
#   permanent fix 需 Workspace + Shared Drive,目前不採用。
#   參考: https://developers.google.com/workspace/drive/api/guides/about-shareddrives

on:
  workflow_dispatch:
    inputs:
      date:
        description: '特定日期 YYYYMMDD (空白則抓今天 Asia/Taipei)'
        required: false
        default: ''
      sources:
        description: '只跑指定來源 (逗號分隔,例 STOCK_INST_TWSE,CB_INST);空白 = 全跑 6 個'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements-stocks.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-stocks.txt

      - name: Run fetcher
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_FOLDERS: ${{ secrets.DRIVE_FOLDERS }}
          FETCH_DATE: ${{ inputs.date }}
          SOURCES: ${{ inputs.sources }}
        run: python scripts/fetch_stocks.py
